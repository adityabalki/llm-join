name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]        # publish fires on version tags like v0.2.0
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          # Fail on syntax errors or undefined names
          flake8 llm_join --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (max line 127)
          flake8 llm_join --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build-wheel:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-join-wheel
          path: dist/*.whl
          retention-days: 30

  publish:
    runs-on: ubuntu-latest
    needs: build-wheel
    if: startsWith(github.ref, 'refs/tags/v')   # only on version tags
    permissions:
      id-token: write   # required for PyPI trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build dist
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
